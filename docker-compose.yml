version: "3.9"

services:
  cryptobot:
    build: .
    container_name: cryptobot
    restart: unless-stopped
    volumes:
      - ./bot_data.json:/app/bot_data.json
    environment:
      - TZ=UTC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Сайт подключается отдельно — пример:
